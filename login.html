<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다 - MediAI & Space Shooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(58, 123, 213, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.1);
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .main-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
            min-height: 1.2rem;
            display: none;
        }

        /* 대시보드 스타일 (로그인 후) */
        #dashboard {
            display: none;
            text-align: center;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: white;
        }

        .app-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .app-card h3 { margin-bottom: 10px; color: var(--primary); }
        .app-card p { font-size: 0.85rem; color: var(--text-dim); }

        .logout-btn {
            margin-top: 30px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 로그인/회원가입 카드 -->
        <div id="authCard" class="card">
            <div class="header">
                <h1>AI & Fun</h1>
                <p>계정에 로그인하여 시작하세요</p>
            </div>

            <div class="tabs">
                <button id="loginTab" class="tab active">로그인</button>
                <button id="signupTab" class="tab">회원가입</button>
            </div>

            <form id="authForm">
                <div class="input-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label for="pw">비밀번호</label>
                    <input type="password" id="pw" placeholder="••••••••" required>
                </div>
                <button type="submit" id="submitBtn" class="main-btn">로그인</button>
            </form>
            
            <p id="errorMsg" class="error-msg"></p>
        </div>

        <!-- 로그인 후 대시보드 -->
        <div id="dashboard" class="card">
            <div class="header">
                <h1 id="welcomeTxt">환영합니다!</h1>
                <p>이동할 서비스를 선택하세요</p>
            </div>

            <div class="apps-grid">
                <a href="diagnosis.html" class="app-card">
                    <h3>MediAI</h3>
                    <p>AI 증상 분석 및<br>건강 조언 서비스</p>
                </a>
                <a href="index.html" class="app-card">
                    <h3>Space Game</h3>
                    <p>스트레스 해소용<br>슈팅 게임</p>
                </a>
            </div>

            <button id="logoutBtn" class="logout-btn">로그아웃</button>
        </div>
    </div>

    <script type="module">
        import { login, register, logout, auth } from "./auth-service.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const authCard = document.getElementById('authCard');
        const dashboard = document.getElementById('dashboard');
        const authForm = document.getElementById('authForm');
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const welcomeTxt = document.getElementById('welcomeTxt');
        const logoutBtn = document.getElementById('logoutBtn');

        let isSignup = false;

        // 탭 전환 로직
        loginTab.onclick = () => {
            isSignup = false;
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            submitBtn.innerText = "로그인";
            errorMsg.style.display = 'none';
        };

        signupTab.onclick = () => {
            isSignup = true;
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            submitBtn.innerText = "회원가입";
            errorMsg.style.display = 'none';
        };

        // 폼 제출 로직
        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pw = document.getElementById('pw').value;
            
            submitBtn.disabled = true;
            submitBtn.innerText = isSignup ? "가입 중..." : "로그인 중...";
            errorMsg.style.display = 'none';

            let result;
            if (isSignup) {
                result = await register(email, pw);
            } else {
                result = await login(email, pw);
            }

            if (result.error) {
                errorMsg.innerText = "오류: " + translateError(result.error);
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = isSignup ? "회원가입" : "로그인";
            }
        };

        logoutBtn.onclick = async () => {
            await logout();
        };

        // 인증 상태 감시
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authCard.style.display = 'none';
                dashboard.style.display = 'block';
                welcomeTxt.innerText = `${user.email.split('@')[0]}님, 반갑습니다!`;
            } else {
                authCard.style.display = 'block';
                dashboard.style.display = 'none';
            }
        });

        // 파이어베이스 에러 메시지 한글 변환
        function translateError(msg) {
            if (msg.includes('auth/invalid-email')) return '유효하지 않은 이메일 형식입니다.';
            if (msg.includes('auth/user-not-found')) return '등록되지 않은 사용자입니다.';
            if (msg.includes('auth/wrong-password')) return '비밀번호가 틀렸습니다.';
            if (msg.includes('auth/email-already-in-use')) return '이미 사용 중인 이메일입니다.';
            if (msg.includes('auth/weak-password')) return '비밀번호는 6자리 이상이어야 합니다.';
            return msg;
        }
    </script>
</body>
</html>
