<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페이스 슈팅 - Antigravity Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-size: 24px;
            text-shadow: 0 0 10px #00ff00;
            pointer-events: none;
        }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            display: none;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background: #00ff00;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            SCORE: <span id="score">0</span>
            <div style="font-size: 14px; margin-top: 5px; color: #aaa;">
                <span id="user-email"></span> | <span id="game-logout" style="cursor:pointer; text-decoration:underline;">로그아웃</span>
            </div>
        </div>
        <div id="msg">
            <h1>GAME OVER</h1>
            <p>최종 점수: <span id="final-score">0</span></p>
            <button onclick="location.reload()">다시 시작</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { checkAuthState, logout } from "./auth-service.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');
        const finalScoreEl = document.getElementById('final-score');
        const userEmailEl = document.getElementById('user-email');
        const logoutBtn = document.getElementById('game-logout');

        // 인증 확인
        checkAuthState((user) => {
            userEmailEl.innerText = user.email.split('@')[0];
            startGame();
        });

        logoutBtn.onclick = () => logout();

        // 게임 설정
        let score = 0;
        let gameOver = false;
        const player = { x: 0, y: 0, w: 40, h: 40, speed: 7 };
        const bullets = [];
        const enemies = [];
        const keys = {};

        function startGame() {
            resize();
            spawnEnemy();
            draw();
        }

        // 화면 크기 맞추기
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width / 2 - player.w / 2;
            player.y = canvas.height - 100;
        }
        window.addEventListener('resize', resize);

        // 입력 감지
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'Space' && !gameOver) fire();
        });

        function fire() {
            bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 15 });
        }

        function spawnEnemy() {
            if (gameOver) return;
            const size = 30 + Math.random() * 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                w: size,
                h: size,
                speed: 2 + Math.random() * 3
            });
            setTimeout(spawnEnemy, 1000 - Math.min(score, 800)); 
        }

        function update() {
            if (gameOver) return;

            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.h) player.y += player.speed;

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 10;
                if (bullets[i].y < -20) bullets.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                
                if (player.x < enemies[i].x + enemies[i].w &&
                    player.x + player.w > enemies[i].x &&
                    player.y < enemies[i].y + enemies[i].h &&
                    player.y + player.h > enemies[i].y) {
                    endGame();
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (bullets[j].x < enemies[i].x + enemies[i].w &&
                        bullets[j].x + bullets[j].w > enemies[i].x &&
                        bullets[j].y < enemies[i].y + enemies[i].h &&
                        bullets[j].y + bullets[j].h > enemies[i].y) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        scoreEl.innerText = score;
                        break;
                    }
                }

                if (enemies[i] && enemies[i].y > canvas.height) enemies.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            for(let i=0; i<20; i++) {
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
            }

            ctx.fillStyle = '#00d2ff';
            ctx.beginPath();
            ctx.moveTo(player.x + player.w / 2, player.y);
            ctx.lineTo(player.x, player.y + player.h);
            ctx.lineTo(player.x + player.w, player.y + player.h);
            ctx.fill();

            ctx.fillStyle = '#ffeb3b';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            ctx.fillStyle = '#f44336';
            enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

            if (!gameOver) requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function endGame() {
            gameOver = true;
            msgEl.style.display = 'block';
            finalScoreEl.innerText = score;
        }
    </script>
</body>
</html>
